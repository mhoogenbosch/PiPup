name: Build APK

on:
  push:
    branches: [master]
    tags: ['v*']
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: gradle/actions/setup-gradle@v4

      # Optional consistent signing: set the KEYSTORE_BASE64, KEYSTORE_PASSWORD,
      # KEY_ALIAS and KEY_PASSWORD repository secrets. Without them the debug APK
      # (signed with an ephemeral debug key) is published instead.
      - name: Restore keystore
        if: ${{ vars.HAS_KEYSTORE == 'true' }}
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > $RUNNER_TEMP/keystore.jks

      - name: Build (signed release)
        if: ${{ vars.HAS_KEYSTORE == 'true' }}
        env:
          KEYSTORE_FILE: ${{ runner.temp }}/keystore.jks
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          ./gradlew assembleRelease
          cp app/build/outputs/apk/release/app-release.apk PiPup.apk

      - name: Build (debug)
        if: ${{ vars.HAS_KEYSTORE != 'true' }}
        run: |
          ./gradlew assembleDebug
          cp app/build/outputs/apk/debug/app-debug.apk PiPup.apk

      - uses: actions/upload-artifact@v4
        with:
          name: PiPup-apk
          path: PiPup.apk

      - name: Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: PiPup.apk
